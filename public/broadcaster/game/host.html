<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Game Host</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{width:100%;height:100%;background:#000;overflow:hidden}
  #unity-container{width:100%;height:100%;display:flex;align-items:center;justify-content:center;background:#000}
  #unity-canvas{display:block;background:#000;outline:none}
  #loading{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:#000;color:#888;font:14px system-ui,sans-serif;gap:14px;z-index:10}
  #loading.hidden{display:none}
  .bar{width:240px;height:6px;background:#1c2230;border-radius:3px;overflow:hidden}
  .bar-fill{height:100%;background:#ef4444;width:0%;transition:width .2s}
  #err{color:#f87171;font-size:12px;max-width:80%;text-align:center;line-height:1.5}
</style>
</head>
<body>

<div id="loading">
  <div id="loading-msg">Initializing…</div>
  <div class="bar"><div id="loading-bar" class="bar-fill"></div></div>
  <div id="err"></div>
</div>

<div id="unity-container">
  <canvas id="unity-canvas" width="1280" height="720" tabindex="-1"></canvas>
</div>

<script>
(function(){
  // === KEY HOOK ===
  // Force preserveDrawingBuffer:true on every WebGL context the page creates.
  // Without this, canvas.captureStream() produces black frames because Unity
  // (and most WebGL apps) default to preserveDrawingBuffer:false for perf.
  const _origGetContext = HTMLCanvasElement.prototype.getContext;
  HTMLCanvasElement.prototype.getContext = function(type, attrs) {
    if (type === 'webgl' || type === 'webgl2' || type === 'experimental-webgl') {
      attrs = Object.assign({}, attrs || {}, {
        preserveDrawingBuffer: true,
        antialias: (attrs && attrs.antialias) || false,
      });
    }
    return _origGetContext.call(this, type, attrs);
  };

  const params = new URLSearchParams(location.search);
  const gamePath = (params.get('game') || '/catwar-game/').replace(/\/+$/, '') + '/';

  const $ = (id) => document.getElementById(id);
  const setMsg = (m) => { $('loading-msg').textContent = m; };
  const setErr = (m) => { $('err').textContent = m; };
  const setProgress = (p) => { $('loading-bar').style.width = (p * 100) + '%'; };
  const hideLoading = () => $('loading').classList.add('hidden');

  function fitCanvas() {
    const c = $('unity-canvas');
    const w = window.innerWidth, h = window.innerHeight;
    const aspect = c.width / c.height;
    let dw = w, dh = w / aspect;
    if (dh > h) { dh = h; dw = h * aspect; }
    c.style.width = dw + 'px';
    c.style.height = dh + 'px';
  }
  window.addEventListener('resize', fitCanvas);
  fitCanvas();

  // Auto-detect Unity build files by parsing the game's index.html.
  // This avoids hardcoding 'deployneu4.*' so other games (like
  // /catwar-game-3rdperson-new/) work with the same host page.
  async function detectBuildConfig(base) {
    setMsg('Detecting build…');
    const r = await fetch(base + 'index.html');
    if (!r.ok) throw new Error('index.html ' + r.status);
    const html = await r.text();

    // Try to parse the original config object literal
    const grab = (key) => {
      const m = html.match(new RegExp(key + '\\s*:\\s*[^,\\n]+', 'i'));
      if (!m) return null;
      const v = m[0].split(/[:=]/).slice(1).join(':').trim();
      return v.replace(/^["']/, '').replace(/["'],?\s*$/, '');
    };
    const buildUrl = grab('var\\s+buildUrl') || 'Build';
    const dataUrl = grab('dataUrl');
    const frameworkUrl = grab('frameworkUrl');
    const codeUrl = grab('codeUrl');
    const loaderMatch = html.match(/loaderUrl\s*=\s*[^;]+/);
    let loaderUrl = null;
    if (loaderMatch) {
      loaderUrl = loaderMatch[0].split('=').slice(1).join('=').trim();
      loaderUrl = loaderUrl.replace(/buildUrl\s*\+\s*["']\/?/, buildUrl + '/').replace(/^["']/, '').replace(/["'].*$/, '');
    }

    const resolve = (u) => {
      if (!u) return null;
      // Replace 'buildUrl + "/x"' style with actual buildUrl
      u = u.replace(/buildUrl\s*\+\s*["']\/?/, buildUrl + '/').replace(/["'].*$/, '');
      return u.startsWith('http') ? u : (base + u);
    };

    return {
      loaderUrl: resolve(loaderUrl) || (base + buildUrl + '/deployneu4.loader.js'),
      dataUrl: resolve(dataUrl),
      frameworkUrl: resolve(frameworkUrl),
      codeUrl: resolve(codeUrl),
      streamingAssetsUrl: base + 'StreamingAssets',
    };
  }

  async function loadGame() {
    try {
      setMsg('Loading game from ' + gamePath);
      const cfg = await detectBuildConfig(gamePath);

      setMsg('Loading Unity loader…');
      await new Promise((resolve, reject) => {
        const s = document.createElement('script');
        s.src = cfg.loaderUrl;
        s.onload = resolve;
        s.onerror = () => reject(new Error('loader.js load failed: ' + cfg.loaderUrl));
        document.body.appendChild(s);
      });

      if (typeof createUnityInstance !== 'function') {
        throw new Error('createUnityInstance not defined after loader');
      }

      setMsg('Initializing Unity…');
      const unityInstance = await createUnityInstance($('unity-canvas'), {
        dataUrl: cfg.dataUrl,
        frameworkUrl: cfg.frameworkUrl,
        codeUrl: cfg.codeUrl,
        streamingAssetsUrl: cfg.streamingAssetsUrl,
        companyName: 'Game',
        productName: 'Game',
        productVersion: '0.1',
      }, (p) => setProgress(p));

      window.unityInstance = unityInstance;
      setMsg('Ready');
      hideLoading();
      $('unity-canvas').focus();
    } catch (e) {
      console.error('[host] load error', e);
      setMsg('Error');
      setErr(String(e.message || e));
    }
  }

  loadGame();
})();
</script>
</body>
</html>
