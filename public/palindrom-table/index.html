<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PalindromTable</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#06060c;--sf:#0b0b15;--bd:#151525;--cy:#00e5ff;--vi:#b266ff;--or:#ff7733;--li:#39ff14;--ma:#ff00c8;--pk:#ff4da6;--yl:#ffe600;--rd:#ff2244;--bl:#4488ff;--tl:#66ccaa;--wh:#dde;--dm:#44445a;--dm2:#2a2a3e}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'Segoe UI',system-ui,sans-serif;color:var(--wh);user-select:none;-webkit-user-select:none;touch-action:manipulation}
#app{display:flex;width:100%;height:100%}

#side{width:220px;min-width:220px;background:var(--sf);border-right:1px solid var(--bd);display:flex;flex-direction:column;z-index:10;overflow-y:auto}
#side h1{padding:14px 14px 2px;font-size:13px;letter-spacing:2.5px;text-transform:uppercase;color:var(--cy);text-shadow:0 0 12px var(--cy);font-weight:700}
.sub{padding:1px 14px 8px;font-size:9px;color:var(--dm)}
.section{padding:8px 10px;border-top:1px solid var(--bd)}
.section-title{font-size:9px;font-weight:700;letter-spacing:1.2px;text-transform:uppercase;color:var(--cy);margin-bottom:6px}

#palindromeInput{width:100%;padding:8px 10px;border-radius:6px;background:#0c0c18;border:1px solid var(--bd);color:var(--wh);font-family:monospace;font-size:14px;text-align:center;letter-spacing:3px;outline:none;transition:.15s}
#palindromeInput:focus{border-color:var(--cy);box-shadow:0 0 8px rgba(0,229,255,.15)}
#palindromeInput.invalid{border-color:var(--rd);box-shadow:0 0 8px rgba(255,34,68,.2)}
.hint{font-size:8px;color:var(--dm);margin-top:4px;text-align:center}
.pal-btns{display:flex;gap:4px;margin-top:6px}
.pal-btn{flex:1;padding:6px;border-radius:5px;background:#0c0c18;border:1px solid var(--bd);cursor:pointer;font:inherit;color:var(--cy);font-size:9px;text-align:center;transition:.15s}
.pal-btn:hover{border-color:var(--cy);box-shadow:0 0 6px rgba(0,229,255,.15)}

.digit-legend{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-top:6px}
.dl-item{display:flex;align-items:center;gap:5px;padding:3px 6px;border-radius:4px;background:#0a0a16;font-size:8px}
.dl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}

.preset-list{display:flex;flex-direction:column;gap:3px}
.pre{display:block;width:100%;padding:6px 8px;border-radius:5px;background:#0c0c18;border:1px solid var(--bd);cursor:pointer;font:inherit;color:var(--wh);font-size:9px;text-align:left;transition:.15s}
.pre:hover{border-color:var(--cy);color:var(--cy);box-shadow:0 0 5px rgba(0,229,255,.1)}
.pre span{color:var(--dm);font-size:7px;margin-left:3px}

#cw{flex:1;position:relative;overflow:hidden}
canvas{display:block;width:100%;height:100%;touch-action:none}

#bar{position:absolute;bottom:12px;left:50%;transform:translateX(-50%);display:flex;gap:5px;background:rgba(11,11,21,.94);border:1px solid var(--bd);border-radius:10px;padding:6px 12px;backdrop-filter:blur(10px);z-index:10;flex-wrap:wrap;justify-content:center;max-width:92%}
.cb{background:none;border:1px solid var(--dm2);color:var(--wh);border-radius:6px;padding:5px 10px;font-size:10px;cursor:pointer;display:flex;align-items:center;gap:3px;transition:.12s;white-space:nowrap;font-family:inherit}
.cb:hover{border-color:var(--cy);color:var(--cy)}
.cb.on{border-color:var(--li);color:var(--li);box-shadow:0 0 6px rgba(57,255,20,.15);background:rgba(57,255,20,.08)}
.cb.kill{font-size:9px}.cb.kill.on{background:rgba(255,34,68,.12);border-color:var(--rd);color:var(--rd);text-decoration:line-through}
.cb.live{border-color:var(--rd);color:var(--rd);font-weight:700}.cb.live:hover{border-color:#ff4466}
.cb.live.on{background:rgba(255,34,68,.15);box-shadow:0 0 8px rgba(255,34,68,.3)}

#help{position:absolute;top:10px;right:10px;z-index:10;background:rgba(11,11,21,.7);border:1px solid var(--bd);border-radius:8px;padding:8px 10px;font-size:9px;color:var(--dm);line-height:1.5;backdrop-filter:blur(6px);max-width:170px}
#help b{color:var(--cy);font-weight:600}

#tog{display:none;position:absolute;top:8px;left:8px;z-index:20;background:rgba(11,11,21,.92);border:1px solid var(--bd);border-radius:6px;padding:6px 10px;font-size:14px;color:var(--cy);cursor:pointer;line-height:1}

.vm-btns{display:flex;gap:3px;margin-bottom:6px;flex-wrap:wrap}
.vm-btn{padding:4px 8px;border-radius:4px;background:#0c0c18;border:1px solid var(--bd);cursor:pointer;font:inherit;color:var(--dm);font-size:8px;transition:.12s;white-space:nowrap}
.vm-btn:hover{border-color:var(--cy);color:var(--cy)}.vm-btn.on{border-color:var(--li);color:var(--li);background:rgba(57,255,20,.08)}

::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--dm2);border-radius:2px}

@media(max-width:900px){
  #side{position:fixed;left:0;top:0;bottom:0;width:240px;z-index:30;transform:translateX(-100%);transition:transform .25s ease}
  #side.open{transform:translateX(0)}
  #side-bg{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:25}
  #side-bg.open{display:block}
  #tog{display:block}
  #help{display:none}
  #bar{max-width:96%;padding:4px 6px;gap:3px;bottom:6px}
  .cb{padding:4px 7px;font-size:9px}
}
</style>
</head>
<body>
<div id="app">
<div id="side">
  <h1>PalindromTable</h1>
  <div class="sub">Interactive Music Disk</div>

  <div class="section">
    <div class="section-title">Palindrom eingeben</div>
    <input id="palindromeInput" type="text" placeholder="z.B. 12321" maxlength="20" autocomplete="off" spellcheck="false">
    <div class="hint" id="palHint">Zahlen-Palindrom eingeben</div>
    <div class="pal-btns">
      <button class="pal-btn" onclick="loadPalindrome()">&#9654; Laden</button>
      <button class="pal-btn" onclick="randomPalindrome()">&#127922; Random</button>
      <button class="pal-btn" onclick="clearAll()">&#10005; Clear</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Instrument-Layout</div>
    <div class="vm-btns" id="voiceMapBtns"></div>
    <div class="section-title" style="margin-top:6px">Ziffern = Instrumente</div>
    <div class="digit-legend" id="digitLegend"></div>
  </div>

  <div class="section">
    <div class="section-title">Presets</div>
    <div class="preset-list" id="presetList"></div>
  </div>
</div>
<div id="side-bg" onclick="toggleSidebar()"></div>

<div id="cw">
  <button id="tog" onclick="toggleSidebar()">&#9776;</button>
  <canvas id="cv"></canvas>
  <div id="bar">
    <button class="cb" id="bp" onclick="togglePlay()">&#9654; Play</button>
    <button class="cb" id="bb" onclick="cycleBPM()">&#9833; 110</button>
    <button class="cb" id="bk" onclick="nextKey()">C min</button>
    <button class="cb" id="bsw" onclick="nextSwing()">Sw 0%</button>
    <button class="cb" id="bm" onclick="toggleMute()">&#128266;</button>
    <button class="cb" onclick="clearAll()">&#10005;</button>
    <button class="cb" onclick="randomPalindrome()">&#127922;</button>
    <span style="width:1px;height:16px;background:var(--bd);margin:0 2px"></span>
    <button class="cb kill" id="kd" onclick="toggleKill('outer')">Drums</button>
    <button class="cb kill" id="km" onclick="toggleKill('mid')">Melody</button>
    <button class="cb kill" id="kb" onclick="toggleKill('inner')">Bass</button>
    <button class="cb live" id="bfill" onmousedown="startFill()" onmouseup="stopFill()" onmouseleave="stopFill()" ontouchstart="startFill()" ontouchend="stopFill()">Fill</button>
    <button class="cb live" id="bdrop" onclick="doDrop()">Drop</button>
  </div>
  <div id="help">
    <b>Palindrom</b> = Instrument Layout<br>
    <b>Scroll</b> = Parameter<br>
    <b>Shift+Scroll</b> = Variation<br>
    <b>Right Click</b> = Remove<br>
    <b>Space</b> = Play/Pause
  </div>
</div>
</div>
<script>
// PalindromTable Engine
const CV = document.getElementById('cv'), G = CV.getContext('2d');
let W, H, cx, cy, tR;
let playing = false, muted = false, bpm = 110, swing = 0;
let sweepAngle = -Math.PI / 2, lastFrame = 0, gTime = 0;
let modules = [], particles = [], ripples = [], shockwaves = [];
let dragging = null, dragOff = { x: 0, y: 0 }, hovered = null;
let killedZones = new Set(), filling = false, absoluteBeat = 0;

const STEPS = 16;
const ZI = 0.33, ZM = 0.66, ZO = 1.0;
const ZC = { outer: '#ff7733', mid: '#b266ff', inner: '#00e5ff' };

const INSTRUMENTS = {
  kick:  { label: 'Kick',  sym: 'K',  color: '#ff6a00', zone: 'outer' },
  snare: { label: 'Snare', sym: 'S',  color: '#ff4da6', zone: 'outer' },
  hihat: { label: 'HiHat', sym: 'H',  color: '#ffe600', zone: 'outer' },
  clap:  { label: 'Clap',  sym: 'C',  color: '#ff8866', zone: 'outer' },
  bass:  { label: 'Bass',  sym: 'Ba', color: '#00e5ff', zone: 'inner' },
  pad:   { label: 'Pad',   sym: 'Pd', color: '#00cc88', zone: 'inner' },
  lead:  { label: 'Lead',  sym: 'L',  color: '#b266ff', zone: 'mid' },
  arp:   { label: 'Arp',   sym: 'A',  color: '#dd44ff', zone: 'mid' },
  bell:  { label: 'Bell',  sym: 'B',  color: '#8888ff', zone: 'mid' },
  acid:  { label: 'Acid',  sym: 'Ac', color: '#ff44aa', zone: 'mid' },
};
const VOICE_MAPS = [
  { name: 'Standard',  keys: ['kick','snare','hihat','bass','lead','pad','arp','bell','acid','clap'] },
  { name: 'Melodisch', keys: ['bass','lead','arp','pad','bell','acid','kick','snare','hihat','clap'] },
  { name: 'Ambient',   keys: ['pad','bell','bass','lead','arp','bell','pad','hihat','kick','snare'] },
  { name: 'Techno',    keys: ['kick','hihat','clap','acid','bass','kick','snare','arp','lead','hihat'] },
];
let curVoiceMap = 0;
function buildDigitDefs() {
  return VOICE_MAPS[curVoiceMap].keys.map(function(k, i) {
    var inst = INSTRUMENTS[k];
    return { digit: i, type: k, label: inst.label, sym: inst.sym, color: inst.color, zone: inst.zone };
  });
}
let DIGIT_DEFS = buildDigitDefs();

const KEY_DATA = {
  'C min': { base: 130.81, p: [1, 1.189, 1.335, 1.498, 1.782] },
  'D min': { base: 146.83, p: [1, 1.189, 1.335, 1.498, 1.782] },
  'E min': { base: 164.81, p: [1, 1.189, 1.335, 1.498, 1.782] },
  'F min': { base: 174.61, p: [1, 1.189, 1.335, 1.498, 1.782] },
  'G min': { base: 196.00, p: [1, 1.189, 1.335, 1.498, 1.782] },
  'A min': { base: 220.00, p: [1, 1.189, 1.335, 1.498, 1.782] },
};
let curKey = 'C min';
function fr(deg, oct) {
  const k = KEY_DATA[curKey];
  return k.base * k.p[((deg % 5) + 5) % 5] * Math.pow(2, oct);
}

let ac = null, masterGain, comp, analyser, anaData, waveData, globalDist;
let delaySend, delayNode, delayFb, delayWet;
let reverbSend, reverbConv, reverbWet;
let chorusSend, chorusDelayL, chorusDelayR, chorusLFO, chorusLFOGainL, chorusLFOGainR, chorusPanL, chorusPanR, chorusWet;
let phaserSend, phaserAllpasses, phaserLFO, phaserLFOGains, phaserWet;
let tapeSend, tapeDelay, tapeLFO, tapeLFOGain, tapeShaper, tapeWet;

function initAudio() {
  if (ac) return;
  ac = new (window.AudioContext || window.webkitAudioContext)();

  comp = ac.createDynamicsCompressor();
  comp.threshold.value = -12; comp.knee.value = 8; comp.ratio.value = 4;
  comp.attack.value = 0.003; comp.release.value = 0.15;

  globalDist = ac.createWaveShaper();
  const distSamples = 8192, distCurve = new Float32Array(distSamples);
  for (let i = 0; i < distSamples; i++) { const x = (i * 2) / distSamples - 1; distCurve[i] = Math.tanh(x * 1.4) * 0.95; }
  globalDist.curve = distCurve; globalDist.oversample = '2x';

  masterGain = ac.createGain(); masterGain.gain.value = 0.5;
  analyser = ac.createAnalyser(); analyser.fftSize = 256; analyser.smoothingTimeConstant = 0.72;
  anaData = new Uint8Array(analyser.frequencyBinCount);
  waveData = new Uint8Array(analyser.fftSize);
  masterGain.connect(globalDist); globalDist.connect(comp); comp.connect(analyser); analyser.connect(ac.destination);

  // Stereo Chorus (two delay lines, L/R panned)
  chorusSend = ac.createGain(); chorusSend.gain.value = 0.5;
  chorusDelayL = ac.createDelay(0.05); chorusDelayL.delayTime.value = 0.012;
  chorusDelayR = ac.createDelay(0.05); chorusDelayR.delayTime.value = 0.016;
  chorusLFO = ac.createOscillator(); chorusLFO.type = 'sine'; chorusLFO.frequency.value = 1.2;
  chorusLFOGainL = ac.createGain(); chorusLFOGainL.gain.value = 0.003;
  chorusLFOGainR = ac.createGain(); chorusLFOGainR.gain.value = -0.003;
  chorusLFO.connect(chorusLFOGainL); chorusLFOGainL.connect(chorusDelayL.delayTime);
  chorusLFO.connect(chorusLFOGainR); chorusLFOGainR.connect(chorusDelayR.delayTime);
  chorusLFO.start();
  chorusPanL = ac.createStereoPanner(); chorusPanL.pan.value = -0.7;
  chorusPanR = ac.createStereoPanner(); chorusPanR.pan.value = 0.7;
  chorusWet = ac.createGain(); chorusWet.gain.value = 0.45;
  chorusSend.connect(chorusDelayL); chorusDelayL.connect(chorusPanL); chorusPanL.connect(chorusWet);
  chorusSend.connect(chorusDelayR); chorusDelayR.connect(chorusPanR); chorusPanR.connect(chorusWet);
  chorusWet.connect(masterGain);

  // Delay (tempo-synced dotted eighth)
  delaySend = ac.createGain(); delaySend.gain.value = 0.35;
  delayNode = ac.createDelay(2); delayNode.delayTime.value = 60 / bpm * 0.75;
  delayFb = ac.createGain(); delayFb.gain.value = 0.32;
  delayWet = ac.createGain(); delayWet.gain.value = 0.4;
  delaySend.connect(delayNode); delayNode.connect(delayFb); delayFb.connect(delayNode);
  delayNode.connect(delayWet); delayWet.connect(masterGain);

  // Reverb (stereo IR, 3s, high-frequency damping for warmth)
  reverbSend = ac.createGain(); reverbSend.gain.value = 0.4;
  const rLen = ac.sampleRate * 3, rBuf = ac.createBuffer(2, rLen, ac.sampleRate);
  for (let c = 0; c < 2; c++) {
    const d = rBuf.getChannelData(c);
    for (let i = 0; i < rLen; i++) {
      const t = i / rLen, env = Math.pow(1 - t, 1.8);
      const hfDamp = 1 - t * 0.7;
      const noise = Math.random() * 2 - 1;
      const filtered = noise * hfDamp + (c === 0 ? Math.sin(i * 0.0003) : Math.cos(i * 0.0003)) * 0.03;
      d[i] = filtered * env * 0.55 * (0.85 + Math.random() * 0.15);
    }
  }
  reverbConv = ac.createConvolver(); reverbConv.buffer = rBuf;
  reverbWet = ac.createGain(); reverbWet.gain.value = 0.45;
  reverbSend.connect(reverbConv); reverbConv.connect(reverbWet); reverbWet.connect(masterGain);

  // Phaser (6 allpass filters + LFO)
  phaserSend = ac.createGain(); phaserSend.gain.value = 0.5;
  phaserWet = ac.createGain(); phaserWet.gain.value = 0.5;
  phaserLFO = ac.createOscillator(); phaserLFO.type = 'sine'; phaserLFO.frequency.value = 0.4;
  phaserAllpasses = []; phaserLFOGains = [];
  let phaserPrev = phaserSend;
  const phaserFreqs = [200, 400, 800, 1600, 3200, 6400];
  for (let i = 0; i < 6; i++) {
    const ap = ac.createBiquadFilter(); ap.type = 'allpass'; ap.frequency.value = phaserFreqs[i]; ap.Q.value = 0.5;
    const lg = ac.createGain(); lg.gain.value = 300 + i * 200;
    phaserLFO.connect(lg); lg.connect(ap.frequency);
    phaserPrev.connect(ap); phaserPrev = ap;
    phaserAllpasses.push(ap); phaserLFOGains.push(lg);
  }
  phaserPrev.connect(phaserWet); phaserWet.connect(masterGain); phaserLFO.start();

  // Tape Saturation (short delay + wow/flutter + tanh)
  tapeSend = ac.createGain(); tapeSend.gain.value = 0.4;
  tapeDelay = ac.createDelay(0.1); tapeDelay.delayTime.value = 0.004;
  tapeLFO = ac.createOscillator(); tapeLFO.type = 'sine'; tapeLFO.frequency.value = 3.5;
  tapeLFOGain = ac.createGain(); tapeLFOGain.gain.value = 0.0008;
  tapeLFO.connect(tapeLFOGain); tapeLFOGain.connect(tapeDelay.delayTime); tapeLFO.start();
  tapeShaper = ac.createWaveShaper();
  const tapeSamples = 4096, tapeCurve = new Float32Array(tapeSamples);
  for (let i = 0; i < tapeSamples; i++) { const x = (i * 2) / tapeSamples - 1; tapeCurve[i] = Math.tanh(x * 2.0); }
  tapeShaper.curve = tapeCurve; tapeShaper.oversample = '2x';
  tapeWet = ac.createGain(); tapeWet.gain.value = 0.45;
  tapeSend.connect(tapeDelay); tapeDelay.connect(tapeShaper); tapeShaper.connect(tapeWet); tapeWet.connect(masterGain);
}

function sidechain(t) {
  if (!ac) return;
  modules.forEach(function(m) {
    if ((m.type === 'bass' || m.type === 'pad') && m.nodes && m.nodes.g) {
      const cur = m.nodes.g.gain.value || 0.15;
      m.nodes.g.gain.setValueAtTime(cur * 0.15, t);
      m.nodes.g.gain.linearRampToValueAtTime(cur, t + 0.08);
    }
  });
}

class Mod {
  constructor(def, x, y, digitIndex, palindromeId) {
    this.id = Date.now() + Math.random();
    this.type = def.type; this.label = def.label; this.sym = def.sym;
    this.color = def.color; this.zone = def.zone; this.digit = def.digit;
    this.digitIndex = digitIndex; this.palindromeId = palindromeId;
    this.x = x; this.y = y; this.r = 26;
    this.param = 0.5; this.variation = 0;
    this.phase = Math.random() * Math.PI * 2;
    this.nodes = null; this.pulse = 0; this.lastBeat = -1;
    this.wH = new Float32Array(24); this.wI = 0;
  }
  get angle() { return Math.atan2(this.y - cy, this.x - cx); }
  get dist() { return Math.hypot(this.x - cx, this.y - cy) / tR; }
  get zp() {
    const d = this.dist;
    if (d < ZI) return d / ZI;
    if (d < ZM) return (d - ZI) / (ZM - ZI);
    return (d - ZM) / (ZO - ZM);
  }
  hit(px, py) { return Math.hypot(px - this.x, py - this.y) <= this.r; }
  initAudio() {
    if (!ac) return; this.destroyAudio(); const n = {};
    const t = this.type;
    if (t === 'bass') {
      n.osc = ac.createOscillator(); n.sub = ac.createOscillator();
      n.flt = ac.createBiquadFilter(); n.g = ac.createGain();
      n.osc.type = 'sawtooth'; n.osc.frequency.value = fr(0, -1);
      n.sub.type = 'sine'; n.sub.frequency.value = fr(0, -2);
      n.subG = ac.createGain(); n.subG.gain.value = 0.4;
      n.flt.type = 'lowpass'; n.flt.frequency.value = 300; n.flt.Q.value = 3; n.g.gain.value = 0;
      n.osc.connect(n.flt); n.sub.connect(n.subG); n.subG.connect(n.g);
      n.flt.connect(n.g); n.g.connect(masterGain);
      n.osc.start(); n.sub.start();
    } else if (t === 'pad') {
      n.o1 = ac.createOscillator(); n.o2 = ac.createOscillator(); n.o3 = ac.createOscillator();
      n.flt = ac.createBiquadFilter(); n.g = ac.createGain();
      n.o1.type = 'sine'; n.o2.type = 'triangle'; n.o3.type = 'sine';
      const bf = fr(0, 0);
      n.o1.frequency.value = bf; n.o2.frequency.value = bf * 1.004; n.o3.frequency.value = bf * 0.997;
      n.flt.type = 'lowpass'; n.flt.frequency.value = 2000; n.flt.Q.value = 0.5; n.g.gain.value = 0;
      n.o1.connect(n.flt); n.o2.connect(n.flt); n.o3.connect(n.flt);
      n.flt.connect(n.g); n.g.connect(masterGain); n.g.connect(reverbSend); n.g.connect(chorusSend);
      n.o1.start(); n.o2.start(); n.o3.start();
    } else if (t === 'lead') {
      n.osc = ac.createOscillator(); n.fmMod = ac.createOscillator(); n.fmG = ac.createGain();
      n.flt = ac.createBiquadFilter(); n.g = ac.createGain();
      n.osc.type = 'square'; n.osc.frequency.value = fr(0, 1);
      n.fmMod.type = 'sine'; n.fmMod.frequency.value = fr(0, 1) * 2;
      n.fmG.gain.value = 60;
      n.fmMod.connect(n.fmG); n.fmG.connect(n.osc.frequency);
      n.flt.type = 'lowpass'; n.flt.frequency.value = 2500; n.flt.Q.value = 3; n.g.gain.value = 0;
      n.osc.connect(n.flt); n.flt.connect(n.g);
      n.g.connect(masterGain); n.g.connect(delaySend); n.g.connect(phaserSend); n.g.connect(chorusSend);
      n.osc.start(); n.fmMod.start();
    } else if (t === 'arp') {
      n.osc = ac.createOscillator(); n.flt = ac.createBiquadFilter(); n.g = ac.createGain();
      n.osc.type = 'sawtooth'; n.osc.frequency.value = fr(0, 1);
      n.flt.type = 'lowpass'; n.flt.frequency.value = 3500; n.flt.Q.value = 5; n.g.gain.value = 0;
      n.osc.connect(n.flt); n.flt.connect(n.g);
      n.g.connect(masterGain); n.g.connect(delaySend); n.g.connect(chorusSend);
      n.osc.start(); n.step = 0;

  killedZones.clear();
  ['kd', 'km', 'kb'].forEach(id => document.getElementById(id).classList.remove('on'));
  if (ac) { const t = ac.currentTime; masterGain.gain.setValueAtTime(0.1, t); masterGain.gain.linearRampToValueAtTime(0.5, t + 0.06); }
  shockwaves.push({ t: 0, x: cx, y: cy });
}
function toggleSidebar() {
  document.getElementById('side').classList.toggle('open');
  document.getElementById('side-bg').classList.toggle('open');
}

function resize() {
  const cw = document.getElementById('cw');
  W = cw.clientWidth; H = cw.clientHeight;
  CV.width = W * devicePixelRatio; CV.height = H * devicePixelRatio;
  CV.style.width = W + 'px'; CV.style.height = H + 'px';
  G.setTransform(devicePixelRatio, 0, 0, devicePixelRatio, 0, 0);
  cx = W / 2; cy = H / 2; tR = Math.min(W, H) * 0.42;
}
window.addEventListener('resize', resize);

function getPos(e) {
  const r = CV.getBoundingClientRect();
  const ev = e.touches ? e.touches[0] : e;
  return { x: ev.clientX - r.left, y: ev.clientY - r.top };
}
CV.addEventListener('mousedown', e => {
  const p = getPos(e);
  for (let i = modules.length - 1; i >= 0; i--) {
    if (modules[i].hit(p.x, p.y)) { dragging = modules[i]; dragOff = { x: p.x - modules[i].x, y: p.y - modules[i].y }; return; }
  }
});
CV.addEventListener('mousemove', e => {
  const p = getPos(e);
  if (dragging) { dragging.x = p.x - dragOff.x; dragging.y = p.y - dragOff.y; return; }
  hovered = null;
  for (let i = modules.length - 1; i >= 0; i--) { if (modules[i].hit(p.x, p.y)) { hovered = modules[i]; break; } }
  CV.style.cursor = hovered ? 'grab' : 'default';
});
CV.addEventListener('mouseup', () => { dragging = null; });
CV.addEventListener('contextmenu', e => {
  e.preventDefault(); const p = getPos(e);
  for (let i = modules.length - 1; i >= 0; i--) {
    if (modules[i].hit(p.x, p.y)) { modules[i].silence(); modules[i].destroyAudio(); modules.splice(i, 1); return; }
  }
});
CV.addEventListener('wheel', e => {
  e.preventDefault(); const p = getPos(e);
  for (let i = modules.length - 1; i >= 0; i--) {
    if (modules[i].hit(p.x, p.y)) {
      if (e.shiftKey) modules[i].variation = (modules[i].variation + (e.deltaY > 0 ? 1 : -1) + 6) % 6;
      else modules[i].param = Math.max(0, Math.min(1, modules[i].param + (e.deltaY > 0 ? -0.05 : 0.05)));
      return;
    }
  }
}, { passive: false });
CV.addEventListener('touchstart', e => {
  e.preventDefault(); const p = getPos(e);
  for (let i = modules.length - 1; i >= 0; i--) {
    if (modules[i].hit(p.x, p.y)) { dragging = modules[i]; dragOff = { x: p.x - modules[i].x, y: p.y - modules[i].y }; return; }
  }
}, { passive: false });
CV.addEventListener('touchmove', e => {
  e.preventDefault(); if (!dragging) return;
  const p = getPos(e); dragging.x = p.x - dragOff.x; dragging.y = p.y - dragOff.y;
}, { passive: false });
CV.addEventListener('touchend', () => { dragging = null; });
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT') return;
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
});

function drawDisk() {
  const bgGrad = G.createRadialGradient(cx, cy, 0, cx, cy, tR * 1.2);
  bgGrad.addColorStop(0, 'rgba(0,229,255,0.03)');
  bgGrad.addColorStop(0.5, 'rgba(178,102,255,0.02)');
  bgGrad.addColorStop(1, 'rgba(0,0,0,0)');
  G.fillStyle = bgGrad; G.fillRect(0, 0, W, H);
  [{r:ZO,c:ZC.outer},{r:ZM,c:ZC.mid},{r:ZI,c:ZC.inner}].forEach(z => {
    G.beginPath(); G.arc(cx, cy, z.r * tR, 0, Math.PI * 2);
    G.strokeStyle = z.c + '22'; G.lineWidth = 1; G.stroke();
    G.beginPath(); G.arc(cx, cy, z.r * tR, 0, Math.PI * 2);
    G.fillStyle = z.c + '06'; G.fill();
  });
  for (let i = 0; i < STEPS; i++) {
    const a = (i / STEPS) * Math.PI * 2 - Math.PI / 2;
    G.beginPath(); G.moveTo(cx, cy);
    G.lineTo(cx + Math.cos(a) * tR, cy + Math.sin(a) * tR);
    G.strokeStyle = 'rgba(255,255,255,0.04)'; G.lineWidth = 1; G.stroke();
    const lx = cx + Math.cos(a) * (tR + 14), ly = cy + Math.sin(a) * (tR + 14);
    G.fillStyle = 'rgba(255,255,255,0.15)';
    G.font = '8px sans-serif'; G.textAlign = 'center'; G.textBaseline = 'middle';
    G.fillText(i.toString(), lx, ly);
  }
  G.beginPath(); G.arc(cx, cy, 4, 0, Math.PI * 2); G.fillStyle = '#fff'; G.fill();
}
function drawSweepArm() {
  const a = sweepAngle;
  const grad = G.createLinearGradient(cx, cy, cx + Math.cos(a) * tR, cy + Math.sin(a) * tR);
  grad.addColorStop(0, 'rgba(0,229,255,0.7)'); grad.addColorStop(1, 'rgba(0,229,255,0.0)');
  G.beginPath(); G.moveTo(cx, cy); G.lineTo(cx + Math.cos(a) * tR * 1.05, cy + Math.sin(a) * tR * 1.05);
  G.strokeStyle = grad; G.lineWidth = 2; G.stroke();
  G.beginPath(); G.arc(cx, cy, tR, a - 0.08, a + 0.08);
  G.strokeStyle = 'rgba(0,229,255,0.3)'; G.lineWidth = tR * 0.03; G.stroke();
}
function drawSymmetryLines() {
  getSymmetryPairs().forEach(function(pair) {
    var a = pair[0], b = pair[1];
    var pulse = Math.max(a.pulse, b.pulse);
    var alpha = 0.08 + pulse * 0.25;
    var ha = Math.round(alpha * 255).toString(16).padStart(2, '0');
    var ha2 = Math.round(alpha * 0.5 * 255).toString(16).padStart(2, '0');
    var grad = G.createLinearGradient(a.x, a.y, b.x, b.y);
    grad.addColorStop(0, a.color + ha);
    grad.addColorStop(0.5, '#ffffff' + ha2);
    grad.addColorStop(1, b.color + ha);
    G.beginPath(); G.moveTo(a.x, a.y); G.lineTo(b.x, b.y);
    G.strokeStyle = grad; G.lineWidth = 1 + pulse * 2; G.stroke();
  });
}
function drawModule(m) {
  var p = m.pulse, glowR = m.r + p * 12;
  if (p > 0.05) {
    var glow = G.createRadialGradient(m.x, m.y, m.r * 0.5, m.x, m.y, glowR);
    glow.addColorStop(0, m.color + Math.round(p * 80).toString(16).padStart(2, '0'));
    glow.addColorStop(1, m.color + '00');
    G.beginPath(); G.arc(m.x, m.y, glowR, 0, Math.PI * 2); G.fillStyle = glow; G.fill();
  }
  G.beginPath(); G.arc(m.x, m.y, m.r, 0, Math.PI * 2);
  G.fillStyle = m.color + '18'; G.fill();
  G.strokeStyle = m.color + (hovered === m ? 'cc' : '66');
  G.lineWidth = hovered === m ? 2 : 1.5; G.stroke();
  var wLen = m.wH.length; G.beginPath();
  for (var i = 0; i < wLen; i++) {
    var a = (i / wLen) * Math.PI * 2 - Math.PI / 2;
    var wr = m.r * 0.5 + m.wH[(m.wI + i) % wLen] * m.r * 0.4;
    var wx = m.x + Math.cos(a) * wr, wy = m.y + Math.sin(a) * wr;
    if (i === 0) G.moveTo(wx, wy); else G.lineTo(wx, wy);
  }
  G.closePath(); G.strokeStyle = m.color + '44'; G.lineWidth = 0.8; G.stroke();
  G.fillStyle = m.color;
  G.font = 'bold 11px sans-serif'; G.textAlign = 'center'; G.textBaseline = 'middle';
  G.fillText(m.sym, m.x, m.y - 3);
  G.font = '8px sans-serif'; G.fillStyle = m.color + '99';
  G.fillText(m.digit.toString(), m.x, m.y + 9);
  G.beginPath(); G.arc(m.x, m.y, m.r + 3, -Math.PI / 2, -Math.PI / 2 + m.param * Math.PI * 2);
  G.strokeStyle = m.color + '55'; G.lineWidth = 2; G.stroke();
  m.pulse *= 0.92;
}
function drawRipples(dt) {
  ripples = ripples.filter(function(rp) {
    rp.t += dt * 3; if (rp.t > 1) return false;
    var cr = rp.r + (rp.mr - rp.r) * rp.t;
    G.beginPath(); G.arc(rp.x, rp.y, cr, 0, Math.PI * 2);
    G.strokeStyle = rp.c + Math.round((1 - rp.t) * 60).toString(16).padStart(2, '0');
    G.lineWidth = 2 * (1 - rp.t); G.stroke(); return true;
  });
}
function drawShockwaves(dt) {
  shockwaves = shockwaves.filter(function(sw) {
    sw.t += dt * 2; if (sw.t > 1) return false;
    var r = sw.t * tR * 1.2;
    G.beginPath(); G.arc(sw.x, sw.y, r, 0, Math.PI * 2);
    G.strokeStyle = 'rgba(0,229,255,' + ((1 - sw.t) * 0.3) + ')';
    G.lineWidth = 3 * (1 - sw.t); G.stroke(); return true;
  });
}
function drawSpectrum() {
  if (!analyser) return;
  analyser.getByteFrequencyData(anaData);
  var bars = anaData.length, step = Math.PI * 2 / bars, baseR = tR * 1.04;
  G.beginPath();
  for (var i = 0; i < bars; i++) {
    var a = i * step - Math.PI / 2, h = (anaData[i] / 255) * tR * 0.15;
    G.moveTo(cx + Math.cos(a) * baseR, cy + Math.sin(a) * baseR);
    G.lineTo(cx + Math.cos(a) * (baseR + h), cy + Math.sin(a) * (baseR + h));
  }
  G.strokeStyle = 'rgba(0,229,255,0.15)'; G.lineWidth = 1.5; G.stroke();
}
function drawParticles(dt) {
  if (Math.random() < 0.3 && modules.length > 0) {
    var m = modules[Math.floor(Math.random() * modules.length)];
    if (m.pulse > 0.2) {
      var a = Math.random() * Math.PI * 2;
      particles.push({ x: m.x + Math.cos(a) * m.r, y: m.y + Math.sin(a) * m.r,
        vx: Math.cos(a) * (20 + Math.random() * 30), vy: Math.sin(a) * (20 + Math.random() * 30), life: 1, c: m.color });
    }
  }
  particles = particles.filter(function(pt) {
    pt.x += pt.vx * dt; pt.y += pt.vy * dt;
    pt.vx *= 0.97; pt.vy *= 0.97; pt.life -= dt * 1.5;
    if (pt.life <= 0) return false;
    G.beginPath(); G.arc(pt.x, pt.y, 2 * pt.life, 0, Math.PI * 2);
    G.fillStyle = pt.c + Math.round(pt.life * 100).toString(16).padStart(2, '0'); G.fill();
    return true;
  });
}

var currentBeat = -1;
function loop(ts) {
  if (!playing) return;
  var dt = Math.min((ts - lastFrame) / 1000, 0.05);
  lastFrame = ts; gTime += dt;
  var beatsPerSec = bpm / 60, stepsPerSec = beatsPerSec * (STEPS / 4);
  sweepAngle += (stepsPerSec / STEPS) * Math.PI * 2 * dt;
  if (sweepAngle > Math.PI * 2 - Math.PI / 2) sweepAngle -= Math.PI * 2;
  var rawBeat = ((sweepAngle + Math.PI / 2) / (Math.PI * 2)) * STEPS;
  var beat = Math.floor(((rawBeat % STEPS) + STEPS) % STEPS);
  if (beat !== currentBeat) {
    currentBeat = beat;
    absoluteBeat++;
    var isOdd = beat % 2 === 1;
    var swingDelaySec = isOdd ? (60 / bpm / 4) * swing : 0;
    var beatAngle = (beat / STEPS) * Math.PI * 2 - Math.PI / 2;
    var triggerThreshold = Math.PI / STEPS * 1.2;
    modules.forEach(function(m) {
      var mAngle = m.angle, diff = mAngle - beatAngle;
      while (diff > Math.PI) diff -= Math.PI * 2;
      while (diff < -Math.PI) diff += Math.PI * 2;
      if (Math.abs(diff) < triggerThreshold) {
        var trigTime = ac ? ac.currentTime + swingDelaySec : 0;
        m.trigger(absoluteBeat, beat, trigTime);
      }
    });
    if (filling) {
      var drums = modules.filter(function(m) { return m.zone === 'outer'; });
      if (drums.length > 0) drums[Math.floor(Math.random() * drums.length)].trigger(absoluteBeat, beat);
    }
  }
  G.clearRect(0, 0, W, H);
  drawDisk(); drawSymmetryLines(); drawSweepArm();
  modules.forEach(function(m) { drawModule(m); });
  drawRipples(dt); drawShockwaves(dt); drawSpectrum(); drawParticles(dt);
  requestAnimationFrame(loop);
}

resize(); buildVoiceMapUI(); buildDigitLegend(); buildPresetUI();
document.getElementById('palindromeInput').addEventListener('input', function(e) {
  var val = e.target.value.replace(/\D/g, ''); e.target.value = val;
  var hint = document.getElementById('palHint');
  if (!val) { hint.textContent = 'Zahlen-Palindrom eingeben'; e.target.classList.remove('invalid'); return; }
  if (isPalindrome(val)) { hint.textContent = '\u2713 Palindrom! (' + val.length + ' Ziffern)'; e.target.classList.remove('invalid'); }
  else { hint.textContent = 'Noch kein Palindrom...'; e.target.classList.remove('invalid'); }
});
document.getElementById('palindromeInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') loadPalindrome();
});
</script>
